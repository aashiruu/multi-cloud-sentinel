name: FinOps Guardrail

on: [pull_request]

jobs:
  infracost:
    name: Infracost Cost Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Infracost
        uses: infracost/actions/setup@v2
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate Infracost JSON
        run: |
          infracost breakdown --path terraform/ \
                            --format json \
                            --out-file /tmp/infracost.json

      - name: Post Infracost Comment
        uses: infracost/actions/comment@v2
        with:
          path: /tmp/infracost.json
          behavior: update

      - name: Check Budget Limit
        run: |
          COST=$(jq '.totalMonthlyCost' /tmp/infracost.json | tr -d '"')
          echo "Predicted Monthly Cost: $COST"

          if [ -z "$COST" ] || [ "$COST" == "null" ]; then COST=0; fi

          if (( $(echo "$COST > 10.0" | bc -l) )); then
            echo "❌ ERROR: Predicted cost of $COST exceeds the $10 budget!"
            exit 1
          else
            echo "✅ Budget check passed."
          fi
