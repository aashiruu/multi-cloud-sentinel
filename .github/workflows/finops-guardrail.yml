name: FinOps Guardrail

on: [pull_request]

jobs:
  infracost:
    name: Infracost Cost Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate Infracost JSON
        run: |
          infracost breakdown --path terraform/ \
                            --format json \
                            --out-file /tmp/infracost.json

      - name: Post Infracost Comment
        run: |
          infracost comment github --path=/tmp/infracost.json \
                                   --repo=$GITHUB_REPOSITORY \
                                   --github-token=${{ github.token }} \
                                   --pull-request=${{ github.event.pull_request.number }} \
                                   --behavior=update

      - name: Check Budget Limit
        run: |
          # Use jq to get the cost, multiply by 100 to compare cents as integers
          RAW_COST=$(jq '.totalMonthlyCost' /tmp/infracost.json | tr -d '"')
          if [ "$RAW_COST" == "null" ] || [ -z "$RAW_COST" ]; then COST=0; else COST=$RAW_COST; fi
          
          COST_CENTS=$(echo "$COST * 100 / 1" | bc)
          LIMIT_CENTS=1000 # $10.00
          
          if [ "$COST_CENTS" -gt "$LIMIT_CENTS" ]; then
            echo "❌ ERROR: Predicted cost of $${COST} exceeds the $10 budget!"
            exit 1
          else
            echo "✅ Budget check passed."
          fi
